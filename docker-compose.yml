version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: gu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: university_chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gu_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/university_chatbot
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs
      - ./vector_store:/app/vector_store
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python scripts/generate_pdfs.py &&
        python scripts/seed_database.py &&
        python -c 'from routes.documents import run_ingestion_pipeline; run_ingestion_pipeline()' &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
